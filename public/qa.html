<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShipERP AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
  <style>
    .chat-wrapper {
      border: 1px solid #ddd;
      border-radius: 10px;
      background: #fff;
      height: 480px;
      overflow-y: auto;
      padding: 16px;
      margin-bottom: 12px;
    }

    .message {
      margin-bottom: 14px;
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 85%;
      white-space: pre-wrap;
      word-wrap: break-word;
      line-height: 1.45;
    }

    .message.user {
      margin-left: auto;
      background: #e8f0fe;
      text-align: left;
    }

    .message.assistant {
      margin-right: auto;
      background: #f3f4f6;
      text-align: left;
    }

    .message.system {
      margin: 0 auto 14px auto;
      background: #fff7e6;
      color: #8a5a00;
      text-align: center;
      max-width: 100%;
    }

    .message-header {
      font-size: 0.85rem;
      font-weight: 700;
      margin-bottom: 6px;
      opacity: 0.75;
    }

    .composer {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .composer-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    textarea#question {
      width: 100%;
      resize: vertical;
      min-height: 90px;
      padding: 10px;
      box-sizing: border-box;
    }

    .muted {
      color: #666;
      font-size: 0.95rem;
    }

    .top-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ShipERP AI Assistant</h1>
    <p id="who" style="color:#555;"></p>

    <section>
      <h2>Ask a Question</h2>

      <div class="top-actions">
        <button id="newChatBtn" type="button">New Conversation</button>
        <span id="chatStatus" class="muted"></span>
      </div>

      <div id="chat" class="chat-wrapper"></div>

      <div class="composer">
        <textarea
          id="question"
          rows="4"
          placeholder="Type your question here... Press Enter to send, Shift+Enter for a new line."
        ></textarea>

        <div class="composer-actions">
          <button id="askBtn" type="button">Ask</button>
        </div>
      </div>
    </section>

    <hr>

    <section>
      <h2>Upload a Document (Private)</h2>
      <input type="file" id="fileInput" />
      <button id="uploadBtn" type="button">Upload</button>
      <p id="uploadStatus"></p>
    </section>
  </div>

  <script src="qa.js"></script>
</body>
</html>
