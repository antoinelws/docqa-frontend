<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShipERP AI Assistant</title>
  <link rel="stylesheet" href="style.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="app-shell">
    <div class="qa-container">
      <header class="qa-header">
        <h1>ShipERP AI Assistant</h1>
        <p id="who" class="who"></p>
      </header>

      <section class="chat-section">
        <div class="chat-topbar">
          <h2>Ask a Question</h2>
          <div class="chat-topbar-actions">
            <button id="newChatBtn" type="button" class="secondary-btn">New Conversation</button>
            <span id="chatStatus" class="chat-status"></span>
          </div>
        </div>

        <div id="chat" class="chat-thread"></div>

        <div class="composer">
          <textarea
            id="question"
            rows="3"
            placeholder="Type your question here... Press Enter to send, Shift+Enter for a new line."
          ></textarea>
          <div class="composer-actions">
            <button id="askBtn" type="button">Ask</button>
          </div>
        </div>
      </section>

      <section class="upload-section">
        <h2>Upload a Document (Private)</h2>
        <div class="upload-row">
          <input type="file" id="fileInput" />
          <button id="uploadBtn" type="button">Upload</button>
        </div>
        <p id="uploadStatus" class="upload-status"></p>
      </section>
    </div>
  </div>

  <script src="qa.js"></script>
</body>
</html>
